}

/* ============================================================
   スクリーンショット
   ============================================================ */
async function screenshot() {
  if (!App.pdfDoc) { showToast('PDFが開かれていません'); return; }
  try {
    const caEl   = document.getElementById('ca');
    const caRect = caEl.getBoundingClientRect();
    const m      = document.createElement('canvas');
    m.width  = Math.round(caRect.width);
    m.height = Math.round(caRect.height);
    const ctx = m.getContext('2d');
    ctx.fillStyle = '#444'; ctx.fillRect(0, 0, m.width, m.height);

    const pc     = App.pc, dc = App.dc;
    const panX   = App.panX, panY = App.panY, ez = App.cssExtraZoom;
    const pcCssW = parseFloat(pc.style.width)  || pc.width;
    const pcCssH = parseFloat(pc.style.height) || pc.height;
    const pdfDpr = pc.width / pcCssW;
    const vW = pcCssW * ez, vH = pcCssH * ez;
    const dstX   = Math.max(0, panX), dstY = Math.max(0, panY);
    const srcXcss = Math.max(0, -panX) / ez;
    const srcYcss = Math.max(0, -panY) / ez;
    const visW   = Math.min(m.width  - dstX, vW - Math.max(0, -panX));
    const visH   = Math.min(m.height - dstY, vH - Math.max(0, -panY));
    if (visW > 0 && visH > 0) {
      const sW = visW / ez, sH = visH / ez;
      ctx.drawImage(pc, srcXcss*pdfDpr, srcYcss*pdfDpr, sW*pdfDpr, sH*pdfDpr, dstX, dstY, visW, visH);
      ctx.drawImage(dc, srcXcss,        srcYcss,        sW,        sH,        dstX, dstY, visW, visH);
    }
    subWindows.forEach(sw => {
      const swRect = sw.el.getBoundingClientRect();
      const bRect  = sw.body.getBoundingClientRect();
      const bx = bRect.left - caRect.left, by = bRect.top - caRect.top;
      const bw = bRect.width, bh = bRect.height;
      if (bx < m.width && by < m.height && bx+bw > 0 && by+bh > 0) {
        ctx.save();
        ctx.rect(Math.max(0,bx), Math.max(0,by), Math.min(bw,m.width-bx), Math.min(bh,m.height-by));
        ctx.clip();
        ctx.drawImage(sw.cvs, sw.offX*sw.innerScale, sw.offY*sw.innerScale, bw, bh, bx, by, bw, bh);
        ctx.restore();
        const sx = swRect.left - caRect.left, sy = swRect.top - caRect.top;
        ctx.save(); ctx.strokeStyle = sw.swColor || '#f07800'; ctx.lineWidth = 2.5;
        ctx.strokeRect(sx, sy, swRect.width, swRect.height); ctx.restore();
      }
    });
    const blob = await new Promise(r => m.toBlob(r, 'image/png'));
    if (!blob) { showToast('スクショ失敗'); return; }
    const fname = 'M_Viewer_' + Date.now() + '.png';
    const file  = new File([blob], fname, { type: 'image/png' });
    if (navigator.share && navigator.canShare?.({ files: [file] })) {
      try { await navigator.share({ title: 'M_Viewer ' + App.fileName, files: [file] }); return; }
      catch(e) { if (e.name === 'AbortError') return; }
    }
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a'); a.href = url; a.download = fname; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 30000);
    showToast('📸 スクショ保存');
  } catch(e) { if (e.name !== 'AbortError') { showToast('スクショ失敗'); console.error(e); } }
}

/* ============================================================
   計算機
   ============================================================ */
let calcExpr = '', calcOper = '', calcVal = '', calcJustEq = false;
const calcHistory = [];

function calcDecPlaces() { return parseInt(document.getElementById('cdec').value) ?? 0; }
function calcDisplay() {
  document.getElementById('cexpr').textContent = calcExpr;
  document.getElementById('cval').textContent  = calcVal || '0';
}

/** 演算実行 */
function _calcCompute(a, op, b) {
  if (op === '+') return a + b;
  if (op === '-') return a - b;
  if (op === '*') return a * b;
  if (op === '/') return b ? a / b : 0;
  return a;
}

function calcNum(n) {
  if (calcJustEq) { calcVal = ''; calcExpr = ''; calcJustEq = false; }
  if (n === '.' && calcVal.includes('.')) return;
  calcVal += n; calcDisplay();
}
function calcOp(op) {
  calcJustEq = false;
  if (calcVal !== '' && calcOper !== '') {
    const a = parseFloat(calcExpr.split(/[÷×＋−]/)[0]) || 0;
    const b = parseFloat(calcVal) || 0;
    calcVal = String(+_calcCompute(a, calcOper, b).toFixed(calcDecPlaces()));
  }
  const OP_SYMBOLS = { '+': '＋', '-': '−', '*': '×', '/': '÷' };
  calcExpr = (calcVal || '0') + OP_SYMBOLS[op];
  calcOper = op; calcVal = ''; calcDisplay();
}
function calcEq() {
  if (!calcOper || calcVal === '') return;
  const a  = parseFloat(calcExpr.split(/[÷×＋−]/)[0]) || 0;
  const b  = parseFloat(calcVal) || 0;
  const rs = String(+_calcCompute(a, calcOper, b).toFixed(calcDecPlaces()));
  calcHistory.unshift(calcExpr + calcVal + ' = ' + rs);
  if (calcHistory.length > 20) calcHistory.pop();
  document.getElementById('chist').innerHTML =
    calcHistory.map(h => `<div class="chi">${h}</div>`).join('');
  calcExpr = calcExpr + calcVal + '='; calcVal = rs;
  calcOper = ''; calcJustEq = true; calcDisplay();
}
function calcFn(f) {
  if      (f === 'C')    { calcExpr = ''; calcVal = ''; calcOper = ''; calcJustEq = false; }
  else if (f === '±')   { if (calcVal) calcVal = String(-parseFloat(calcVal)); }
  else if (f === '%')    { if (calcVal) calcVal = String(parseFloat(calcVal) / 100); }
  else if (f === '⌫')   { calcVal = calcVal.length > 1 ? calcVal.slice(0, -1) : ''; }
  else if (f === 'sqrt') { if (!calcVal) return; const v = parseFloat(calcVal); calcVal = v < 0 ? 'エラー' : String(+Math.sqrt(v).toFixed(calcDecPlaces())); }
  else if (f === 'sq')   { if (!calcVal) return; calcVal = String(+(parseFloat(calcVal)**2).toFixed(calcDecPlaces())); }
  else if (f === '=')    { calcEq(); return; }
  calcDisplay();
}
function toggleCalc() {
  const el  = document.getElementById('calc');
  el.classList.toggle('on');
  document.getElementById('calcbtn').classList.toggle('on', el.classList.contains('on'));
}

/* 計算機ドラッグ */
(() => {
  const el = document.getElementById('calc');
  let dragging = false, ox = 0, oy = 0, ex = 0, ey = 0;
  const onStart = e => {
    if (e.target.closest('#cclose')) return;
    const s = e.touches ? e.touches[0] : e;
    dragging = true; ox = s.clientX; oy = s.clientY;
    const r = el.getBoundingClientRect(); ex = r.left; ey = r.top;
    if (e.cancelable) e.preventDefault(); e.stopPropagation();
  };
  const onMove = e => {
    if (!dragging) return;
    const s = e.touches ? e.touches[0] : e;
    el.style.left   = (ex + s.clientX - ox) + 'px';
    el.style.top    = (ey + s.clientY - oy) + 'px';
    el.style.bottom = 'auto'; el.style.right = 'auto';
  };
  const onEnd = () => { dragging = false; };
  document.getElementById('ctb').addEventListener('touchstart', onStart, { passive: false });
  document.getElementById('ctb').addEventListener('mousedown',  onStart);
  document.addEventListener('touchmove', onMove, { passive: true });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchend',  onEnd);
  document.addEventListener('mouseup',   onEnd);
})();

/* ============================================================
   トースト / ローディング
   ============================================================ */
let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('on'), 2800);
}
function showLoading(visible) {
  document.getElementById('loading').classList.toggle('on', visible);
}

/* ============================================================
   イベントバインド (DOMContentLoaded後に実行)
   ============================================================ */
(function bindEvents() {
  /* --- ヘッダー行1 --- */
  document.getElementById('btn-open') .addEventListener('click', () => openFile());
  document.getElementById('dz-open')  .addEventListener('click', () => openFile());
  document.getElementById('btn-undo') .addEventListener('click', () => App.undo());
  document.getElementById('btn-save') .addEventListener('click', () => savePDF());
  document.getElementById('btn-shot') .addEventListener('click', () => screenshot());
  document.getElementById('btn-print').addEventListener('click', () => printPage());
  document.getElementById('calcbtn')  .addEventListener('click', () => toggleCalc());
  document.getElementById('btn-close').addEventListener('click', () => App.closeFile());
  document.getElementById('cclose')   .addEventListener('click', () => toggleCalc());

  /* --- ヘッダー行2: ページナビ --- */
  document.getElementById('btn-prev').addEventListener('click', () => App.gotoPage(-1));
  document.getElementById('btn-next').addEventListener('click', () => App.gotoPage(+1));
  document.getElementById('btn-fit') .addEventListener('click', () => App.fit());
  document.getElementById('pgn').addEventListener('change', e =>
    App.gotoPage(+e.target.value, true));

  /* --- ツールボタン --- */
  ['pen','hl','text','eraser','sub'].forEach(id =>
    document.getElementById('t-' + id).addEventListener('click', () => setTool(id)));

  document.getElementById('t-shape').addEventListener('click', e =>
    togglePicker('shapepop', e.currentTarget));
  document.querySelectorAll('#shapepop [data-shape]').forEach(btn =>
    btn.addEventListener('click', () => pickShape(btn.dataset.shape)));

  document.getElementById('t-select').addEventListener('click', e =>
    togglePicker('selpop', e.currentTarget));
  document.querySelectorAll('#selpop [data-selmode]').forEach(btn =>
    btn.addEventListener('click', () => setSelMode(btn.dataset.selmode)));

  /* --- カラースウォッチ --- */
  document.querySelectorAll('.csw').forEach(el =>
    el.addEventListener('click', () => setColor(el)));

  /* --- 太さ --- */
  document.getElementById('sz-v').addEventListener('click', e => toggleSzPanel(e.currentTarget));
  document.getElementById('sz-rng').addEventListener('input',  e => onSzChange(e.target.value));
  document.getElementById('sz-n')  .addEventListener('change', e => onSzChange(e.target.value));
  document.getElementById('szp-ok')    .addEventListener('click', () => applySz());
  document.getElementById('szp-cancel').addEventListener('click', () =>
    document.getElementById('szp').classList.remove('on'));

  /* --- テキスト入力 --- */
  document.getElementById('txConfirm').addEventListener('click', () => confirmTx());
  document.getElementById('txCancel') .addEventListener('click', () => cancelTx());
  document.getElementById('txfld').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) confirmTx();
    if (e.key === 'Escape') cancelTx();
  });

  /* --- 選択削除 --- */
  document.getElementById('selbtn').addEventListener('click', () => App.deleteSelected());

  /* --- 計算機ボタン (data属性でディスパッチ) --- */
  document.getElementById('cbtns').addEventListener('click', e => {
    const btn = e.target.closest('[data-cnum],[data-cop],[data-cfn]');
    if (!btn) return;
    if (btn.dataset.cnum !== undefined) calcNum(btn.dataset.cnum);
    else if (btn.dataset.cop  !== undefined) calcOp(btn.dataset.cop);
    else if (btn.dataset.cfn  !== undefined) calcFn(btn.dataset.cfn);
  });

  /* --- グローバルクリック: ピッカー & 太さパネルを閉じる --- */
  document.addEventListener('click', e => {
    if (!e.target.closest('.pkw'))
      closeAllPickers();
    if (!e.target.closest('#szp') && !e.target.closest('.sz-val'))
      document.getElementById('szp').classList.remove('on');
  });
})();
</script>
